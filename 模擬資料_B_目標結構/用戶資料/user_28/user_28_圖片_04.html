<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Duty Free Receipt</title>
    <style>
        body { font-family: "Courier New", monospace; background-color: #f0f0f0; padding: 20px; display: flex; justify-content: center; }
        .document { background-color: white; width: 400px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px dashed #000; padding-bottom: 10px; }
        .store-name { font-size: 22px; font-weight: bold; }
        .table { width: 100%; margin-bottom: 20px; font-size: 14px; }
        .table td { padding: 5px 0; }
        .amount { text-align: right; }
        .trap { font-weight: bold; color: #dc2626; }
    </style>
</head>
<body>
    <div class="document">
        <div class="header">
            <div class="store-name">AIRPORT DUTY FREE</div>
            <div>Departure Lounge</div>
            <div>Date: 10 AUG</div>
            <div>Receipt No: 99201-443</div>
        </div>
        
        <table class="table">
            <tr><th style="text-align:left;">Item</th><th class="amount">Qty</th><th class="amount">Price</th></tr>
            <tr><td colspan="3" style="border-top: 1px dashed #000;"></td></tr>
            <tr ><td>Lunch Combo</td><td class='amount'>1</td><td class='amount'>15,000</td></tr>

            <tr><td colspan="3" style="border-top: 1px dashed #000;"></td></tr>
            <tr style="font-size: 16px; font-weight: bold;">
                <td colspan="2">TOTAL</td>
                <td class="amount">15,000</td>
            </tr>
        </table>
        
        <div style="text-align: center; font-size: 12px; margin-top: 30px;">
            THANK YOU FOR SHOPPING
        </div>
    </div>
</body>
</html>
