<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Boarding Pass</title>
    <style>
        body { font-family: "Arial", sans-serif; background-color: #f3f4f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .document { background-color: white; width: 700px; padding: 30px; margin-bottom: 20px; border: 2px solid #1e3a8a; border-radius: 8px; }
        .boarding-pass { border: 2px dashed #1e3a8a; border-radius: 12px; padding: 20px; position: relative; display: flex; }
        .bp-left { flex: 3; border-right: 2px dashed #1e3a8a; padding-right: 20px; }
        .bp-right { flex: 1; padding-left: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .title { font-size: 20px; font-weight: bold; color: #1e3a8a; margin-bottom: 15px; border-bottom: 1px solid #1e3a8a; padding-bottom: 5px; }
        .field { font-size: 12px; color: #6b7280; text-transform: uppercase; margin-top: 10px; }
        .value { font-size: 16px; font-weight: bold; color: #111827; }
    </style>
</head>
<body>
    <div class="document boarding-pass">
        <div class="bp-left">
            <div style="font-size: 24px; font-weight: bold; color: #1e3a8a;">EVA AIR</div>
            <div style="font-size: 14px; color: #4b5563; margin-bottom: 20px;">BOARDING PASS</div>
            <div style="display: flex; flex-wrap: wrap;">
                <div style="width: 50%;">
                    <div class="field">Name of Passenger</div>
                    <div class="value">圓谷光彥</div>
                </div>
                <div style="width: 50%;">
                    <div class="field">Flight</div>
                    <div class="value" style="color: #1e3a8a;">BR 115</div>
                </div>
                <div style="width: 50%; margin-top: 15px;">
                    <div class="field">From</div>
                    <div class="value">CTS</div>
                </div>
                <div style="width: 50%; margin-top: 15px;">
                    <div class="field">To</div>
                    <div class="value">TPE</div>
                </div>
                <div style="width: 33%; margin-top: 15px;">
                    <div class="field">Date</div>
                    <div class="value">05 AUG</div>
                </div>
                <div style="width: 33%; margin-top: 15px;">
                    <div class="field">Seat</div>
                    <div class="value">18K</div>
                </div>
                <div style="width: 33%; margin-top: 15px;">
                    <div class="field">Gate</div>
                    <div class="value">62</div>
                </div>
            </div>
        </div>
        <div class="bp-right">
            <div>
                <div class="field">Passenger</div>
                <div class="value" style="font-size: 14px;">圓谷光彥</div>
            </div>
            <div>
                <div class="field">Flight</div>
                <div class="value">BR 115</div>
            </div>
            <div>
                <div class="field">Seat</div>
                <div class="value">18K</div>
            </div>
            <div style="font-size: 11px; text-align: center; margin-top: 20px; border: 1px solid #000; padding: 5px;">
                FOR CLAIM PURPOSE
            </div>
        </div>
    </div>
</body>
</html>
