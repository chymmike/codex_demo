<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>道路交通事故當事人登記聯單</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #e0e0e0; padding: 20px; display: flex; justify-content: center; }
        .document { background-color: white; width: 800px; padding: 40px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .header { text-align: center; border-bottom: 3px double #333; padding-bottom: 10px; margin-bottom: 20px; }
        .police-name { font-size: 26px; font-weight: bold; letter-spacing: 5px; margin-bottom: 5px; }
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .info-table th, .info-table td { border: 1px solid #000; padding: 10px 12px; font-size: 15px; }
        .info-table th { background-color: #e8f4f8; text-align: left; width: 130px; }
    </style>
</head>
<body>
    <div class="document">
        <div class="header">
            <div class="police-name">內政部警政署 警察局</div>
            <div style="font-size: 20px; letter-spacing: 2px;">道路交通事故當事人登記聯單</div>
        </div>
        
        <div style="text-align: right; margin-bottom: 10px;">處理編號：115-TP-0502-0089</div>
        
        <table class="info-table">
            <tr><th>發生時間</th><td colspan="3">2026 年 05 月 02 日 08 時 10 分</td></tr>
            <tr><th>發生地點</th><td colspan="3">國道一號南下 25K</td></tr>
            <tr><th>當事人(一)</th><td>陳建宏 (駕駛人)</td><th>車牌號碼</th><td>ABC-1234</td></tr>
            <tr><th>當事人(二)</th><td>陳大文 (駕駛人)</td><th>車牌號碼</th><td>ABC-0299 (自小客車)</td></tr>
            <tr>
                <th>肇事經過概要</th>
                <td colspan="3" style="height: 100px; vertical-align: top; line-height: 1.6;">
                    當事人(二)行駛國道因前方車流回堵煞車不及，追撞當事人(一)車尾，造成車頭受損。
                </td>
            </tr>
            <tr>
                <th>備註與違規事實</th>
                <td colspan="3" style="height: 80px; vertical-align: top; font-weight: bold;">
                    1. 當事人(二)酒測值 0.00mg/L。<br>2. 當事人(二)車輛：前保桿、引擎蓋受損。<br>3. 當事人(一)車輛：後保桿受損。
                </td>
            </tr>
            <tr><th>處理單位</th><td>交通大隊</td><th>承辦員警</th><td>警員 林大雄 (印)</td></tr>
        </table>
    </div>
</body>
</html>
