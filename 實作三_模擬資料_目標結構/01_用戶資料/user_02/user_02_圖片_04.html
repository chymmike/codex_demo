<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>統一發票</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .document { background-color: white; width: 600px; padding: 30px; border: 2px solid #b91c1c; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header { text-align: center; color: #b91c1c; border-bottom: 2px solid #b91c1c; padding-bottom: 10px; margin-bottom: 20px; }
        .invoice-title { font-size: 24px; font-weight: bold; letter-spacing: 5px; }
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
        .info-table td { padding: 5px 0; }
        .details-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .details-table th, .details-table td { border-bottom: 1px dashed #ccc; padding: 10px 5px; text-align: left; }
        .details-table th { color: #b91c1c; border-bottom: 2px solid #b91c1c; }
        .amount { text-align: right; }
    </style>
</head>
<body>
    <div class="document">
        <div class="header">
            <div class="invoice-title">電子發票證明聯</div>
            <div style="font-size: 18px; font-weight: bold; margin-top: 5px;">115年05-06月</div>
            <div style="font-size: 20px; font-weight: bold; color: black; margin-top: 5px;">字軌號碼：BB-22334455</div>
        </div>
        
        <table class="info-table">
            <tr><td>開立日期：2026/05/04</td></tr>
            <tr><td>買受人：陳大文</td></tr>
            <tr><td>銷售方：宏達汽車維修廠 (統編: 88776655)</td></tr>
        </table>

        <table class="details-table">
            <tr>
                <th>品名</th>
                <th style="width: 15%; text-align: center;">數量</th>
                <th style="width: 20%;" class="amount">金額</th>
            </tr>
            <tr><td>汽車車體鈑金烤漆維修工料</td><td style="text-align: center;">1</td><td class="amount">16,857</td></tr>
            <tr><td>營業稅 (5%)</td><td style="text-align: center;">-</td><td class="amount">843</td></tr>
            <tr>
                <th colspan="2" style="color: black; text-align: right;">總計金額 (含稅)</th>
                <th class="amount" style="color: black; font-size: 16px; font-weight: bold;">17,700</th>
            </tr>
        </table>
    </div>
</body>
</html>
